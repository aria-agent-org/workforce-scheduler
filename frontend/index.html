<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
    <meta name="description" content="שבצק — מערכת שיבוץ עובדים חכמה ליחידות צבאיות" />
    <meta name="theme-color" content="#2563eb" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="שבצק" />
    <meta name="application-name" content="שבצק" />
    <meta name="msapplication-TileColor" content="#2563eb" />

    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-192x192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="144x144" href="/icons/icon-144x144.png" />

    <!-- Apple Splash Screens (common sizes) -->
    <link rel="apple-touch-startup-image" href="/icons/icon-512x512.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <title>שבצק — Shavtzak</title>

    <!-- Inline critical CSS for fast first paint -->
    <style>
      body { margin: 0; font-family: 'Heebo', Arial, sans-serif; }
      #root { min-height: 100vh; min-height: 100dvh; }
      .app-loader {
        display: flex; align-items: center; justify-content: center;
        min-height: 100vh; min-height: 100dvh;
        background: #f8fafc; color: #2563eb;
        font-size: 1.5rem; font-weight: 700;
      }
      @media (prefers-color-scheme: dark) {
        .app-loader { background: #0f172a; color: #60a5fa; }
      }
      /* Safe area padding */
      .safe-area-top { padding-top: env(safe-area-inset-top, 0); }
      .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom, 0); }
    </style>
  </head>
  <body class="font-sans antialiased safe-area-top">
    <div id="root">
      <div class="app-loader">🎯 שבצק</div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
