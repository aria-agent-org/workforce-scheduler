image: python:3.12-slim

pipelines:
  default:
    - parallel:
        - step:
            name: Backend Tests
            caches:
              - pip
            services:
              - postgres
              - redis
            script:
              - cd backend
              - pip install -r requirements.txt -r requirements-dev.txt
              - ruff check .
              - pytest -v --tb=short
            services:
              postgres:
                image: postgres:16-alpine
                environment:
                  POSTGRES_DB: shavtzak_test
                  POSTGRES_USER: shavtzak
                  POSTGRES_PASSWORD: testpass
              redis:
                image: redis:7-alpine

        - step:
            name: Frontend Build
            image: node:20-alpine
            caches:
              - node
            script:
              - cd frontend
              - npm install --legacy-peer-deps
              - npm run build
